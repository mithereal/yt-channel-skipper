<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; background: #282828; color: #fff; width: 320px; }
    textarea { width: 100%; height: 200px; background: #181818; color: #fff; border: 1px solid #333; padding: 8px; box-sizing: border-box; resize: none; margin-bottom: 10px;}
    button { background: #cc0000; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 8px;}
    button:hover { background: #ff0000; }
    
    /* Styles for the new Export/Import row */
    .action-row { display: flex; gap: 8px; }
    .action-row button { background: #444; }
    .action-row button:hover { background: #666; }
    
    #status { display: block; margin-top: 10px; color: #4CAF50; font-weight: bold; text-align: center; height: 20px;}
  </style>
</head>
<body>
  <h3>Blocked Channels</h3>
  <p style="font-size: 12px; color: #aaa;">Add one exact channel name per line.</p>
  
  <textarea id="channelList" spellcheck="false"></textarea>
  <button id="saveBtn">Save List</button>
  
  <div class="action-row">
    <button id="exportBtn">Export JSON</button>
    <button id="importBtn">Import JSON</button>
  </div>
  
  <input type="file" id="fileInput" accept=".json" style="display: none;">
  
  <span id="status"></span>
  <script src="options.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* Theme color definitions responsive to the browser's current mode */
        :root {
          --bg-color: #f9f9f9;
          --panel-bg: #ffffff;
          --text-main: #0f0f0f;
          --text-muted: #606060;
          --border-color: #e5e5e5;
          --input-border: #ccc;
          --input-bg: #ffffff;
          --shadow-color: rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --input-border: #444444;
            --input-bg: #2d2d2d;
            --shadow-color: rgba(0, 0, 0, 0.5);
          }
        }

        body {
          width: 320px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          padding: 12px;
          margin: 0;
          background: var(--bg-color);
          color: var(--text-main);
        }

        h3 {
          margin-top: 0;
          color: var(--text-main);
          border-bottom: 1px solid var(--border-color);
          padding-bottom: 8px;
          margin-bottom: 12px;
        }

        .flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        .toggle-container {
          background: var(--panel-bg);
          padding: 8px;
          border-radius: 6px;
          box-shadow: 0 1px 3px var(--shadow-color);
        }

        .input-group { display: flex; gap: 6px; margin-bottom: 10px; }

        input[type="text"] {
          flex-grow: 1;
          padding: 6px;
          border: 1px solid var(--input-border);
          background: var(--input-bg);
          color: var(--text-main);
          border-radius: 4px;
        }
        input[type="text"]::placeholder {
          color: var(--text-muted);
        }

        button { background: #cc0000; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #990000; }

        .channel-list {
          max-height: 180px;
          overflow-y: auto;
          border: 1px solid var(--border-color);
          padding: 0;
          margin: 0;
          list-style: none;
          background: var(--panel-bg);
          border-radius: 4px;
        }

        .channel-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 6px 10px;
          border-bottom: 1px solid var(--border-color);
          font-size: 14px;
        }
        .channel-item:last-child { border-bottom: none; }

        .remove-btn { background: none; color: var(--text-muted); padding: 2px 6px; font-size: 12px; }
        .remove-btn:hover { color: #cc0000; background: none; }

        /* Toggle switch tracking components */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--input-border); transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Footer layout positioning the gear icon cleanly to the lower right corner */
        .popup-footer {
          display: flex;
          justify-content: flex-end;
          align-items: center;
          margin-top: 12px;
          padding-top: 4px;
        }
        .gear-btn {
          font-size: 22px;
          color: var(--text-muted);
          cursor: pointer;
          user-select: none;
          line-height: 1;
          transition: transform 0.4s ease, color 0.2s ease;
        }
        .gear-btn:hover {
          color: var(--text-main);
          transform: rotate(90deg);
        }
    </style>
</head>
<body>
<h3>YT Channel Skipper</h3>

<div class="toggle-container flex">
    <span style="font-weight: 500;">Extension Enabled</span>
    <label class="switch">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="slider"></span>
    </label>
</div>

<div class="input-group">
    <input type="text" id="channel-input" placeholder="Exact Channel Name...">
    <button id="add-button" style="background: #28a745;">Add</button>
</div>

<ul id="channels-list" class="channel-list"></ul>

<div class="popup-footer">
    <span id="options-gear" class="gear-btn" title="Open Extension Options">⚙</span>
</div>

<script src="popup.js"></script>
</body>
</html>
